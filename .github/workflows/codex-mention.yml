name: Codex On Mention

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex_mention:
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '@codex') && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Run Codex for mention
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            A reviewer requested Codex help on PR #${{ github.event.issue.number }} in ${{ github.repository }}.

            User comment:
            ---
            ${{ github.event.comment.body }}

            Instructions:
            - Respond to what the user asked.
            - If code changes are required, provide a concrete patch plan.
            - If analysis only is requested, provide findings with clear file references.
            - Keep the response concise and practical.

  reply_to_comment:
    if: ${{ needs.codex_mention.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    needs: codex_mention
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Reply in PR thread
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_mention.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE
            });
